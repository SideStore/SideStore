# Documentation - https://github.com/actions/labeler

# General Labels
'Build | Project System':
  - changed-files:
    - any-glob-to-any-file:
      - '.github/*'
      - '.github/**/*'
      - '*.xcconfig'
      - '**/*.xcconfig'
      - '*.xcodeproj/*'
      - '**/*.xcodeproj/*'
      - 'Makefile'
      - '.editorconfig'
      - '.gitignore'

'Dependencies':
  - changed-files:
    - any-glob-to-any-file:
      - 'Dependencies/*'
      - 'Dependencies/**/*'
      - '.gitmodules'

'Documentation':
  - changed-files:
    - any-glob-to-any-file:
      - '*.md'
      - '**/*.md'
      - 'LICENSE'

'GUI/UIKit':
  - changed-files:
    - any-glob-to-any-file:
      - 'SideStore/Views/*'
      - 'SideStore/Views/**/*'
      - 'AltStore/App Detail/*.swift'
      - 'AltStore/Browse/*.swift'
      - 'AltStore/Authentication/*.swift'
      - 'AltStore/My Apps/*.swift'
      - 'AltStore/News/*.swift'
      - 'AltStore/Settings/*.swift'
      - 'AltStore/Sources/*.swift'

'Resources | Assets':
  - changed-files:
    - any-glob-to-any-file:
      - 'AltStore/Resources/*'
      - 'AltStore/Resources/**/*'
      - 'AltStore/Base.lproj/*'
      - 'AltStore/Base.lproj/**/*'
      - 'AltBackup/Assets.xcassets/*'
      - 'AltBackup/Assets.xcassets/**/*'
      - 'AltWidget/Assets.xcassets/*'
      - 'AltWidget/Assets.xcassets/**/*'

