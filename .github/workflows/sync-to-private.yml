name: Sync to Minis-Store

# Runs automatically on pushes to key branches, or manually from the Actions tab.
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - develop
      - 'claude/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repo (all branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so all branches are available

      - name: Fetch all remote branches
        run: git fetch --all

      - name: Push to OofMini/Minis-Store
        env:
          MINIS_STORE_TOKEN: ${{ secrets.MINIS_STORE_TOKEN }}
        run: |
          if [ -z "$MINIS_STORE_TOKEN" ]; then
            echo "MINIS_STORE_TOKEN not configured, skipping push."
            exit 0
          fi
          bash push-to-private.sh
