name: Sync to Minis-Store

# Runs automatically on pushes to key branches, or manually from the Actions tab.
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - develop
      - 'claude/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repo (all branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so all branches are available

      - name: Fetch all remote branches
        run: git fetch --all

      - name: Push to OofMini/Minis-Store
        env:
          # Add a secret named MINIS_STORE_TOKEN in this repo's Settings → Secrets.
          # Use a Classic PAT with 'repo' scope, or a fine-grained token with
          # read+write access to OofMini/Minis-Store.
          GITHUB_TOKEN: ${{ secrets.MINIS_STORE_TOKEN }}
        run: bash push-to-private.sh
